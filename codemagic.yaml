workflows:
  react-native-android:
    name: hälsoPilot Android
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Expo CLI
        script: npm install -g expo-cli eas-cli
      - name: Prebuild Android
        script: npx expo prebuild --platform android --clean
      - name: Pin Gradle version
        script: |
          sed -i '' 's|gradle-8.*-all.zip|gradle-8.3-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
